<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2GM Booking</title>
<style>
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f4ef;
    --bg-tertiary: #faf9f5;
    --bg-warning: #FAEEDA;
    --bg-danger: #FCEBEB;
    --bg-success: #E1F5EE;
    --text-primary: #2C2C2A;
    --text-secondary: #5F5E5A;
    --text-tertiary: #888780;
    --text-warning: #854F0B;
    --text-danger: #A32D2D;
    --text-success: #0F6E56;
    --border-tertiary: rgba(0,0,0,0.12);
    --border-secondary: rgba(0,0,0,0.2);
    --radius-md: 8px;
    --radius-lg: 12px;
  }

  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    color: var(--text-primary);
    background: var(--bg-tertiary);
    margin: 0;
    padding: 1.5rem;
  }

  .container { max-width: 1800px; margin: 0 auto; }

  .header {
    background: #2C2C2A;
    color: white;
    padding: 12px 20px;
    border-radius: var(--radius-lg);
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
  }
  .header h1 { margin: 0; font-size: 20px; font-weight: 500; }
  .header select {
    padding: 6px 12px;
    border-radius: var(--radius-md);
    border: 1px solid rgba(255,255,255,0.3);
    background: #444;
    color: white;
    font-size: 14px;
    font-family: inherit;
  }
  .header-buttons { display: flex; gap: 8px; align-items: center; }
  .header-btn {
    padding: 6px 14px;
    border-radius: var(--radius-md);
    border: 1px solid rgba(255,255,255,0.3);
    background: transparent;
    color: white;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }
  .header-btn:hover { background: rgba(255,255,255,0.1); }
  .header-btn.primary { background: #1D9E75; border-color: #1D9E75; }

  .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 1rem; }
  .stat { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 12px; }
  .stat-label { font-size: 12px; color: var(--text-secondary); }
  .stat-value { font-size: 22px; font-weight: 500; margin-top: 2px; }

  .floors { display: grid; grid-template-columns: minmax(0,1fr) minmax(0,1fr); gap: 12px; }
  .floor-card {
    background: var(--bg-primary);
    border: 0.5px solid var(--border-tertiary);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  .floor-head {
    padding: 10px 14px;
    background: var(--bg-secondary);
    border-bottom: 0.5px solid var(--border-tertiary);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .floor-head .title { font-weight: 500; font-size: 14px; }
  .floor-head .sub { font-size: 12px; color: var(--text-secondary); }

  table { width: 100%; font-size: 12px; border-collapse: collapse; table-layout: fixed; }
  thead th {
    padding: 6px 6px;
    text-align: left;
    color: var(--text-secondary);
    font-weight: 400;
    border-bottom: 0.5px solid var(--border-tertiary);
  }
  tbody tr { border-bottom: 0.5px solid var(--border-tertiary); cursor: pointer; }
  tbody tr:hover { background: var(--bg-secondary); }
  tbody td { padding: 6px 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .status-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px; border-radius: 4px;
    border: 1px solid var(--border-secondary); cursor: pointer; padding: 0;
    background: transparent; font-size: 13px; font-weight: 700; line-height: 1;
    vertical-align: middle;
  }
  .status-btn.needs-print { background: #FCEBEB; color: #A32D2D; border-color: #E24B4A; }
  .status-btn.printed { background: #E1F5EE; color: #0F6E56; border-color: #1D9E75; }

  .clean-btn {
    display: inline-block; width: 18px; height: 18px; border-radius: 50%;
    border: 1px solid var(--border-secondary); cursor: pointer; padding: 0;
    vertical-align: middle;
  }
  .clean-btn.dirty { background: #E24B4A; border-color: #A32D2D; }
  .clean-btn.clean { background: #1D9E75; border-color: #0F6E56; }

  .muted { color: var(--text-secondary); }
  .empty-text { color: var(--text-tertiary); font-style: italic; }

  .pill { padding: 1px 6px; border-radius: 4px; font-size: 11px; }
  .pill.danger { background: var(--bg-danger); color: var(--text-danger); }
  .pill.warning { background: var(--bg-warning); color: var(--text-warning); }

  .detail {
    margin-top: 1rem;
    background: var(--bg-primary);
    border: 0.5px solid var(--border-tertiary);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    display: none;
  }
  .detail.open { display: block; }
  .detail-grid {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 1.5rem;
    flex-wrap: wrap;
  }
  .detail-main { flex: 1; min-width: 280px; }
  .detail-name { font-weight: 500; font-size: 18px; margin-bottom: 4px; }
  .detail-sub { color: var(--text-secondary); font-size: 13px; margin-bottom: 12px; }
  .detail-info { font-size: 13px; }
  .detail-info td { padding: 3px 0; }
  .detail-info td:first-child { color: var(--text-secondary); padding-right: 20px; }
  .detail-actions { display: flex; flex-direction: column; gap: 6px; min-width: 160px; }
  .detail-actions button {
    padding: 8px 16px;
    border: 0.5px solid var(--border-secondary);
    border-radius: var(--radius-md);
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
  }
  .detail-actions button:hover { background: var(--bg-secondary); }
  .detail-actions button.primary { background: #2C2C2A; color: white; border-color: #2C2C2A; }
  .detail-actions button.danger { color: var(--text-danger); }

  .loading { text-align: center; padding: 40px; color: var(--text-secondary); }
  .error { text-align: center; padding: 40px; color: var(--text-danger); }

  .note-dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: #EF9F27; vertical-align: middle; margin-left: 3px;
  }

  @media (max-width: 900px) {
    body { padding: 0.75rem; }
    .floors { grid-template-columns: 1fr; }
    .stats { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1 id="headerTitle">2GM Booking</h1>
    <div class="header-buttons">
      <select id="propertySelect"></select>
      <button class="header-btn" onclick="loadData()">Refresh</button>
      <button class="header-btn" onclick="showIncoming()">Incoming List</button>
      <button class="header-btn primary" onclick="showNewBooking()">+ New booking</button>
    </div>
  </div>

  <div class="stats" id="statsBar">
    <div class="stat"><div class="stat-label">Checked in</div><div class="stat-value" id="statCheckedIn">-</div></div>
    <div class="stat"><div class="stat-label">Empty rooms</div><div class="stat-value" id="statEmpty">-</div></div>
    <div class="stat"><div class="stat-label">Needs cleaning</div><div class="stat-value" id="statDirty">-</div></div>
    <div class="stat"><div class="stat-label">Door tag: needs print</div><div class="stat-value" id="statDoorTag">-</div></div>
    <div class="stat"><div class="stat-label">Low battery (&lt;30%)</div><div class="stat-value" id="statBattery">-</div></div>
  </div>

  <div class="floors">
    <div class="floor-card">
      <div class="floor-head">
        <span class="title" id="floor1Title">1st floor</span>
        <span class="sub" id="floor1Sub"></span>
      </div>
      <table>
        <colgroup>
          <col style="width:28px"><col style="width:28px"><col style="width:50px">
          <col><col style="width:80px"><col style="width:44px">
          <col style="width:180px">
        </colgroup>
        <thead><tr>
          <th>T</th><th>C</th><th>Room</th><th>Name</th><th>Company</th><th>Bat.</th><th>Dates</th>
        </tr></thead>
        <tbody id="floor1Body"></tbody>
      </table>
    </div>
    <div class="floor-card">
      <div class="floor-head">
        <span class="title" id="floor2Title">2nd floor</span>
        <span class="sub" id="floor2Sub"></span>
      </div>
      <table>
        <colgroup>
          <col style="width:28px"><col style="width:28px"><col style="width:50px">
          <col><col style="width:80px"><col style="width:44px">
          <col style="width:180px">
        </colgroup>
        <thead><tr>
          <th>T</th><th>C</th><th>Room</th><th>Name</th><th>Company</th><th>Bat.</th><th>Dates</th>
        </tr></thead>
        <tbody id="floor2Body"></tbody>
      </table>
    </div>
  </div>

  <div class="detail" id="detailPanel"></div>

</div>

<script>
// ============================================================
// CONFIGURATION — Update this URL to match your SharePoint site
// ============================================================
const SITE_URL = 'https://2gmeiendom.sharepoint.com/sites/2GMBooking';
const API_BASE = SITE_URL + '/_api/web/lists';

// ============================================================
// STATE
// ============================================================
let properties = [];
let rooms = [];
let bookings = [];
let selectedProperty = null;
let selectedRoom = null;
let selectedBooking = null;

// ============================================================
// SharePoint REST API helpers
// ============================================================
async function spGet(listName, select, filter, expand) {
  let url = `${API_BASE}/getbytitle('${listName}')/items?$top=5000`;
  if (select) url += `&$select=${select}`;
  if (filter) url += `&$filter=${filter}`;
  if (expand) url += `&$expand=${expand}`;
  
  const response = await fetch(url, {
    headers: {
      'Accept': 'application/json;odata=verbose'
    },
    credentials: 'include'
  });
  
  if (!response.ok) {
    throw new Error(`Failed to fetch ${listName}: ${response.status} ${response.statusText}`);
  }
  
  const data = await response.json();
  return data.d.results;
}

async function spUpdate(listName, itemId, updates) {
  // Get the item first for its etag
  const itemUrl = `${API_BASE}/getbytitle('${listName}')/items(${itemId})`;
  const itemResp = await fetch(itemUrl, {
    headers: { 'Accept': 'application/json;odata=verbose' },
    credentials: 'include'
  });
  const itemData = await itemResp.json();
  const etag = itemData.d.__metadata.etag;
  const itemType = itemData.d.__metadata.type;

  // Get request digest for write operations
  const digestResp = await fetch(SITE_URL + '/_api/contextinfo', {
    method: 'POST',
    headers: { 'Accept': 'application/json;odata=verbose' },
    credentials: 'include'
  });
  const digestData = await digestResp.json();
  const digest = digestData.d.GetContextWebInformation.FormDigestValue;

  updates.__metadata = { type: itemType };

  const response = await fetch(itemUrl, {
    method: 'POST',
    headers: {
      'Accept': 'application/json;odata=verbose',
      'Content-Type': 'application/json;odata=verbose',
      'X-RequestDigest': digest,
      'X-HTTP-Method': 'MERGE',
      'If-Match': etag
    },
    credentials: 'include',
    body: JSON.stringify(updates)
  });

  if (!response.ok && response.status !== 204) {
    throw new Error(`Failed to update: ${response.status}`);
  }
}

// ============================================================
// DATA LOADING
// ============================================================
async function loadProperties() {
  try {
    properties = await spGet('Properties', 'Id,Title,Address,Contact_Phone,Active');
    const select = document.getElementById('propertySelect');
    select.innerHTML = properties.map(p => 
      `<option value="${p.Id}">${p.Title}</option>`
    ).join('');
    select.onchange = () => {
      selectedProperty = properties.find(p => p.Id === parseInt(select.value));
      loadData();
    };
    selectedProperty = properties[0];
  } catch (e) {
    console.error('Error loading properties:', e);
    document.querySelector('.container').innerHTML = `
      <div class="error">
        <h2>Cannot connect to SharePoint</h2>
        <p>${e.message}</p>
        <p>Make sure you are logged into SharePoint and accessing this page from the same browser.</p>
        <p>This page must be hosted on SharePoint to access the data. See instructions below.</p>
        <hr>
        <h3>How to host on SharePoint:</h3>
        <ol style="text-align:left; max-width:600px; margin:0 auto;">
          <li>Go to your SharePoint site: ${SITE_URL}</li>
          <li>Click Site Contents (Områdeinnhold)</li>
          <li>Click Site Assets (Områderessurser) or create a document library</li>
          <li>Upload this HTML file there</li>
          <li>Open the file from SharePoint</li>
        </ol>
      </div>`;
  }
}

async function loadData() {
  if (!selectedProperty) return;
  
  document.getElementById('headerTitle').textContent = '2GM Booking — ' + selectedProperty.Title;
  
  try {
    // Load rooms for selected property
    rooms = await spGet('Rooms', 
      'Id,Title,Floor,Active,Door_Battery_Level,Property/Title',
      `Property/Title eq '${selectedProperty.Title}'`,
      'Property'
    );

    // Load active and upcoming bookings
    const allBookings = await spGet('Booking',
      'Id,Title,Person_Name,Company,Check_In,Check_Out,Status,Door_Tag_Status,Cleaning_Status,Notes,Property_Name,Floor,Room/Title',
      `Property_Name eq '${selectedProperty.Title}' and (Status eq 'Active' or Status eq 'Upcoming')`,
      'Room'
    );
    bookings = allBookings;

    renderFloors();
    updateStats();
  } catch (e) {
    console.error('Error loading data:', e);
  }
}

// ============================================================
// RENDERING
// ============================================================
function getBookingForRoom(roomNumber) {
  // Prefer Active over Upcoming
  const active = bookings.find(b => 
    b.Room && b.Room.Title === roomNumber && b.Status === 'Active'
  );
  if (active) return active;
  
  return bookings.find(b => 
    b.Room && b.Room.Title === roomNumber && b.Status === 'Upcoming'
  );
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;
}

function doorTagButton(booking) {
  if (!booking) return '<button class="status-btn" disabled></button>';
  const status = booking.Door_Tag_Status || 'None';
  if (status === 'Needs-print') return `<button class="status-btn needs-print" onclick="cycleDoorTag(event, ${booking.Id})">✕</button>`;
  if (status === 'Printed') return `<button class="status-btn printed" onclick="cycleDoorTag(event, ${booking.Id})">✓</button>`;
  return `<button class="status-btn" onclick="cycleDoorTag(event, ${booking.Id})"></button>`;
}

function cleaningButton(booking) {
  if (!booking) return '<button class="clean-btn" disabled></button>';
  const status = booking.Cleaning_Status || 'None';
  if (status === 'Dirty') return `<button class="clean-btn dirty" onclick="cycleCleaning(event, ${booking.Id})"></button>`;
  if (status === 'Clean') return `<button class="clean-btn clean" onclick="cycleCleaning(event, ${booking.Id})"></button>`;
  return `<button class="clean-btn" onclick="cycleCleaning(event, ${booking.Id})"></button>`;
}

function batteryCell(level) {
  if (level === null || level === undefined) return '<span class="muted">—</span>';
  if (level < 30) return `<span class="pill danger">${level}</span>`;
  if (level < 60) return `<span class="pill warning">${level}</span>`;
  return `<span>${level}</span>`;
}

function datesCell(booking) {
  if (!booking) return '<span class="empty-text">Empty</span>';
  
  const checkIn = formatDate(booking.Check_In);
  const checkOut = booking.Check_Out ? formatDate(booking.Check_Out) : 'Open-ended';
  
  const today = new Date();
  today.setHours(0,0,0,0);
  const inDate = new Date(booking.Check_In);
  inDate.setHours(0,0,0,0);
  const daysUntil = Math.round((inDate - today) / (1000*60*60*24));
  
  let dateStyle = '';
  if (booking.Status === 'Upcoming' || daysUntil > 0) {
    if (daysUntil >= 0 && daysUntil <= 4) dateStyle = 'color: #1D9E75; font-weight: 500;';
    else if (daysUntil > 4 && daysUntil <= 30) dateStyle = 'color: #EF9F27; font-weight: 500;';
  }
  
  return `<span style="${dateStyle}">${checkIn}</span> — ${checkOut}`;
}

function renderRow(room) {
  const booking = getBookingForRoom(room.Title);
  const name = booking ? booking.Person_Name : '';
  const company = booking ? (booking.Company || '') : '';
  const battery = room.Door_Battery_Level;
  
  return `<tr onclick="showDetail('${room.Title}')">
    <td>${doorTagButton(booking)}</td>
    <td>${cleaningButton(booking)}</td>
    <td style="font-variant-numeric: tabular-nums; font-weight: 500;">${room.Title}</td>
    <td>${name || '<span class="empty-text">—</span>'}${booking && booking.Notes ? '<span class="note-dot"></span>' : ''}</td>
    <td class="muted">${company}</td>
    <td style="text-align: right; font-variant-numeric: tabular-nums;">${batteryCell(battery)}</td>
    <td style="font-variant-numeric: tabular-nums;">${datesCell(booking)}</td>
  </tr>`;
}

function renderFloors() {
  const floor1Rooms = rooms.filter(r => r.Floor === 1).sort((a,b) => a.Title.localeCompare(b.Title));
  const floor2Rooms = rooms.filter(r => r.Floor === 2).sort((a,b) => a.Title.localeCompare(b.Title));
  
  document.getElementById('floor1Body').innerHTML = floor1Rooms.map(r => renderRow(r)).join('');
  document.getElementById('floor2Body').innerHTML = floor2Rooms.map(r => renderRow(r)).join('');
  
  const f1Min = floor1Rooms.length ? floor1Rooms[0].Title : '';
  const f1Max = floor1Rooms.length ? floor1Rooms[floor1Rooms.length-1].Title : '';
  const f2Min = floor2Rooms.length ? floor2Rooms[0].Title : '';
  const f2Max = floor2Rooms.length ? floor2Rooms[floor2Rooms.length-1].Title : '';
  
  document.getElementById('floor1Title').textContent = '1st floor';
  document.getElementById('floor1Sub').textContent = f1Min && f1Max ? `Rooms ${f1Min}–${f1Max}` : '';
  document.getElementById('floor2Title').textContent = '2nd floor';
  document.getElementById('floor2Sub').textContent = f2Min && f2Max ? `Rooms ${f2Min}–${f2Max}` : '';
}

function updateStats() {
  const activeBookings = bookings.filter(b => b.Status === 'Active');
  const totalRooms = rooms.length;
  const occupiedRooms = activeBookings.length;
  const emptyRooms = totalRooms - occupiedRooms;
  const dirtyRooms = bookings.filter(b => b.Cleaning_Status === 'Dirty').length;
  const needsPrint = bookings.filter(b => b.Door_Tag_Status === 'Needs-print').length;
  const lowBattery = rooms.filter(r => r.Door_Battery_Level !== null && r.Door_Battery_Level < 30).length;
  
  document.getElementById('statCheckedIn').textContent = `${occupiedRooms} / ${totalRooms}`;
  document.getElementById('statEmpty').textContent = emptyRooms;
  document.getElementById('statDirty').textContent = dirtyRooms;
  document.getElementById('statDoorTag').textContent = needsPrint;
  document.getElementById('statBattery').textContent = lowBattery;
}

// ============================================================
// DETAIL PANEL
// ============================================================
function showDetail(roomNumber) {
  const room = rooms.find(r => r.Title === roomNumber);
  const booking = getBookingForRoom(roomNumber);
  const panel = document.getElementById('detailPanel');
  
  selectedRoom = room;
  selectedBooking = booking;
  
  if (!booking) {
    panel.innerHTML = `
      <div class="detail-grid">
        <div class="detail-main">
          <div class="detail-name">Room ${roomNumber}</div>
          <div class="detail-sub">Empty</div>
        </div>
        <div class="detail-actions">
          <button class="primary" onclick="showNewBooking()">Create booking</button>
          <button onclick="closeDetail()">Close</button>
        </div>
      </div>`;
  } else {
    const doorTagLabel = {'None':'—', 'Needs-print':'✕ Needs print', 'Printed':'✓ Printed'}[booking.Door_Tag_Status] || '—';
    const cleaningLabel = {'None':'—', 'Dirty':'● Needs cleaning', 'Clean':'● Clean'}[booking.Cleaning_Status] || '—';
    
    panel.innerHTML = `
      <div class="detail-grid">
        <div class="detail-main">
          <div class="detail-name">${booking.Person_Name}</div>
          <div class="detail-sub">Room ${roomNumber} · ${booking.Company || ''}</div>
          <table class="detail-info">
            <tr><td>Check-in</td><td>${formatDate(booking.Check_In)}</td></tr>
            <tr><td>Check-out</td><td>${booking.Check_Out ? formatDate(booking.Check_Out) : 'Open-ended'}</td></tr>
            <tr><td>Status</td><td>${booking.Status}</td></tr>
            <tr><td>Door tag</td><td>${doorTagLabel}</td></tr>
            <tr><td>Cleaning</td><td>${cleaningLabel}</td></tr>
            ${booking.Notes ? `<tr><td>Notes</td><td>${booking.Notes}</td></tr>` : ''}
          </table>
        </div>
        <div class="detail-actions">
          <button onclick="editBooking(${booking.Id})">Edit</button>
          ${booking.Status === 'Active' ? `<button onclick="checkOut(${booking.Id})">Check out</button>` : ''}
          <button class="danger" onclick="cancelBooking(${booking.Id})">Cancel booking</button>
          <button onclick="closeDetail()">Close</button>
        </div>
      </div>`;
  }
  
  panel.classList.add('open');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  selectedRoom = null;
  selectedBooking = null;
}

// ============================================================
// ACTIONS
// ============================================================
async function cycleDoorTag(event, bookingId) {
  event.stopPropagation();
  const booking = bookings.find(b => b.Id === bookingId);
  if (!booking) return;
  
  const cycle = {'None':'Needs-print', 'Needs-print':'Printed', 'Printed':'None'};
  const newStatus = cycle[booking.Door_Tag_Status || 'None'];
  
  try {
    await spUpdate('Booking', bookingId, { Door_Tag_Status: newStatus });
    booking.Door_Tag_Status = newStatus;
    renderFloors();
    updateStats();
  } catch (e) {
    console.error('Error updating door tag:', e);
    alert('Failed to update door tag status');
  }
}

async function cycleCleaning(event, bookingId) {
  event.stopPropagation();
  const booking = bookings.find(b => b.Id === bookingId);
  if (!booking) return;
  
  const cycle = {'None':'Dirty', 'Dirty':'Clean', 'Clean':'None'};
  const newStatus = cycle[booking.Cleaning_Status || 'None'];
  
  try {
    await spUpdate('Booking', bookingId, { Cleaning_Status: newStatus });
    booking.Cleaning_Status = newStatus;
    renderFloors();
    updateStats();
  } catch (e) {
    console.error('Error updating cleaning status:', e);
    alert('Failed to update cleaning status');
  }
}

async function checkOut(bookingId) {
  if (!confirm('Check out this guest?')) return;
  
  try {
    const today = new Date().toISOString();
    await spUpdate('Booking', bookingId, { 
      Status: 'Completed', 
      Cleaning_Status: 'Dirty',
      Check_Out: today
    });
    await loadData();
    closeDetail();
  } catch (e) {
    console.error('Error checking out:', e);
    alert('Failed to check out');
  }
}

async function cancelBooking(bookingId) {
  if (!confirm('Cancel this booking?')) return;
  
  try {
    await spUpdate('Booking', bookingId, { Status: 'Cancelled' });
    await loadData();
    closeDetail();
  } catch (e) {
    console.error('Error cancelling:', e);
    alert('Failed to cancel booking');
  }
}
